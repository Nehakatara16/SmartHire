<!DOCTYPE html>
<html lang="en">
<head>
    <title>Upload Resume</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="glass">

        <h3 class="mb-4">📤 Upload Resume</h3>

        <!-- ✅ SINGLE FORM -->
        <form action="{{ url_for('upload_page') }}" method="POST">

            {% if role == 'admin' %}
            <textarea name="job_description" class="form-control mb-3" 
placeholder="Paste Job Description here..." required></textarea>
            <!-- ADMIN -->
            <div class="mb-3">
                <label>Select Resume Files</label>
                <input type="file" name="resumes" multiple class="form-control" required>
            </div>
        
            <div class="mb-3">
                <label>Job Description</label>
                <textarea name="job_desc" class="form-control"></textarea>
            </div>
        
            <div class="mb-3">
                <label>Job Role</label>
                <input type="text" name="job_role" class="form-control">
            </div>
        
            <button class="btn btn-success w-100">Upload & Analyze</button>
        
            {% else %}
        
            <!-- USER -->
            <div class="mb-3">
                <label>Upload Resume</label>
                <input type="file" name="resume" class="form-control" required>
            </div>
        
            <button class="btn btn-primary w-100">Upload Resume</button>
        
            {% endif %}
        
        </form>
    </div>

</div>

</body>
</html>
