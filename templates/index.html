<!DOCTYPE html>
<html lang="en">
<head>
    <title>SmartHire AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .card {
            border-radius: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- TOP NAV -->
    <div class="top-bar">
        <a href="/dashboard" class="btn btn-dark">Dashboard</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="text-center mb-4">
        <h1>🚀 SmartHire AI</h1>
        <p>AI Powered Resume & Hiring System</p>
    </div>

    <div class="card p-4 shadow-lg">

        <!-- ================= ADMIN VIEW ================= -->
        {% if session['role'] == 'admin' %}

        <h4 class="mb-3">👨‍💼 Admin Resume Screening</h4>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="job_desc" class="form-control" rows="4"
                          placeholder="Enter job requirements..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload Multiple Resumes</label>
                <input type="file" name="resumes" class="form-control"
                       multiple accept=".pdf,.docx" required>
            </div>

            <button type="submit" class="btn btn-dark w-100">
                Analyze Candidates
            </button>
        </form>

        {% endif %}


        <!-- ================= CANDIDATE VIEW ================= -->
        {% if session['role'] == 'candidate' %}

        <h4 class="mb-3">👤 Candidate Profile</h4>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Skills</label>
                <input type="text" name="skills" class="form-control"
                       placeholder="Python, Java, SQL..." required>
            </div>

            <div class="mb-3">
                <label>Education</label>
                <input type="text" name="education" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Experience</label>
                <input type="text" name="experience" class="form-control"
                       placeholder="Fresher / 2 years etc">
            </div>

            <div class="mb-3">
                <label>Upload Resume</label>
                <input type="file" name="resume" class="form-control"
                       accept=".pdf,.docx" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Submit & Get AI Score
            </button>

        </form>

        {% endif %}

    </div>

</div>

</body>
</html>
