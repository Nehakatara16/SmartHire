<!DOCTYPE html>
<html lang="en">
<head>
    <title>Upload Resume</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="glass">

        <h3 class="mb-4">📤 Upload Resume</h3>

        <form action="{{ url_for('handle_upload') }}" method="POST" ></form>

            {% if role == 'admin' %}

            <!-- ADMIN: JOB DESCRIPTION -->
            <div class="mb-3">
                <label>Job Description</label>
                <textarea name="job_role" class="form-control"
                          placeholder="Paste Job Description here..." required></textarea>
            </div>

            <!-- ADMIN: MULTIPLE FILE UPLOAD -->
            <div class="mb-3">
                <label>Select Resume Files</label>
                <input type="file" name="resumes" multiple class="form-control" required>
            </div>

            <button class="btn btn-success w-100">Upload & Analyze</button>

            {% else %}

            <!-- USER: SINGLE UPLOAD -->
            <div class="mb-3">
                <label>Upload Resume</label>
                <input type="file" name="resume" class="form-control" required>
            </div>

            <!-- USER: OPTIONAL JOB DESCRIPTION -->
            <div class="mb-3">
                <label>Job Description (Optional)</label>
                <textarea name="job_role" class="form-control"
                          placeholder="Paste Job Description for AI scoring (optional)"></textarea>
            </div>

            <button class="btn btn-primary w-100">Upload Resume</button>

            {% endif %}

        </form>

    </div>

</div>

</body>
</html>
